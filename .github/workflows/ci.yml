name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-packages --all-extras --frozen

      - name: Compile Python sources
        run: uv run python -m compileall services scripts

      - name: Run unit tests
        run: uv run pytest

      - name: Run quick evaluation gate
        env:
          MLFLOW_TRACKING_URI: file:${{ github.workspace }}/mlruns
        run: uv run --package training python scripts/eval_quick.py --n-samples 6000 --artifact-dir reports/ci_eval

      - name: Verify documentation files exist
        run: |
          test -f README.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f docs/benchmark-results.md
          test -f docs/model-card.md
          test -f docs/feature-schema.md
