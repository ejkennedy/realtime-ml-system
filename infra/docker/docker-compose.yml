version: "3.9"

networks:
  fraud-net:
    driver: bridge

volumes:
  redpanda-data:
  redis-data:
  mlflow-data:
  minio-data:
  grafana-data:
  prometheus-data:
  flink-checkpoints:

services:
  # ─── Redpanda (Kafka-compatible broker) ───────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 2
      - --memory 512M
      - --reserve-memory 0M
      - --default-log-level=warn
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - fraud-net
    ports:
      - "18081:18081"  # Schema Registry
      - "18082:18082"  # REST Proxy
      - "19092:19092"  # Kafka (external)
      - "9644:9644"    # Admin API
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      retries: 5

  redpanda-console:
    image: redpandadata/console:v2.6.0
    container_name: redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - fraud-net
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      SCHEMAREGISTRY_ENABLED: "true"
      SCHEMAREGISTRY_URLS: http://redpanda:8081
    restart: unless-stopped

  # ─── Topic initialiser (runs once then exits) ─────────────────────────────
  topic-init:
    image: redpandadata/redpanda:v24.1.1
    container_name: topic-init
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - fraud-net
    entrypoint: >
      bash -c "
        rpk topic create transactions-raw --brokers redpanda:9092 --partitions 12 --replicas 1;
        rpk topic create transactions-enriched --brokers redpanda:9092 --partitions 12 --replicas 1;
        rpk topic create transactions-scored --brokers redpanda:9092 --partitions 12 --replicas 1;
        rpk topic create shadow-results --brokers redpanda:9092 --partitions 6 --replicas 1;
        rpk topic create retraining-triggers --brokers redpanda:9092 --partitions 1 --replicas 1;
        echo 'Topics created.';
      "
    restart: "no"

  # ─── Redis (Feast online feature store) ───────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - fraud-net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ─── MinIO (S3-compatible — Iceberg offline store + MLflow artifacts) ──────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - fraud-net
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web UI
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-06-10T16-59-44Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - fraud-net
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/fraud-detection;
        mc mb --ignore-existing local/mlflow-artifacts;
        echo 'Buckets created.';
      "
    restart: "no"

  # ─── MLflow (Model registry + experiment tracking) ────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: mlflow
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - fraud-net
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root s3://mlflow-artifacts/
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      retries: 5

  # ─── Apache Flink (streaming feature pipeline) ────────────────────────────
  flink-jobmanager:
    build:
      context: ./flink
    image: fraud-flink:1.19
    container_name: flink-jobmanager
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fraud-net
    ports:
      - "8081:8081"   # Flink Web UI
    environment:
      FLINK_ROLE: jobmanager
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      FEAST_REPO_PATH: /feast/repo
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
    volumes:
      - flink-checkpoints:/flink-checkpoints
      - ../../services/feature-store/src/feature_store/repo:/feast/repo:ro
      - ../../services/streaming:/app/streaming:ro
    command: jobmanager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      retries: 8

  flink-taskmanager:
    build:
      context: ./flink
    image: fraud-flink:1.19
    container_name: flink-taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    networks:
      - fraud-net
    environment:
      FLINK_ROLE: taskmanager
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_TASK_MANAGER_NUMBER_OF_TASK_SLOTS: "4"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
    volumes:
      - flink-checkpoints:/flink-checkpoints
      - ../../services/feature-store/src/feature_store/repo:/feast/repo:ro
      - ../../services/streaming:/app/streaming:ro
    command: taskmanager
    deploy:
      replicas: 2
    restart: unless-stopped

  # ─── Ray (serving + online learning) ──────────────────────────────────────
  ray-head:
    build:
      context: ./ray
    image: fraud-ray:2.32
    container_name: ray-head
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    networks:
      - fraud-net
    ports:
      - "8265:8265"   # Ray dashboard
      - "8000:8000"   # Ray Serve HTTP endpoint
      - "6379:6379"   # Ray GCS (internal, conflicts with Redis — using 6380 externally)
    environment:
      RAY_HEAD: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      ONNX_MODEL_PATH: /models/fraud_detector/latest/model.onnx
      ONNX_SESSION_POOL_SIZE: "4"
      SHADOW_ENABLED: "true"
      SHADOW_RATIO: "1.0"
      ENV: local
    volumes:
      - ../../models:/models:ro
      - ../../services/serving:/app/serving:ro
      - ../../services/feature-store/src/feature_store/repo:/feast/repo:ro
    command: >
      sh -c "
        ray start --head --dashboard-host=0.0.0.0 --dashboard-port=8265 --port=6380 --block &
        sleep 5;
        python /app/serving/src/serving/app.py;
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8265"]
      interval: 20s
      retries: 8

  # ─── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    networks:
      - fraud-net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # ─── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    depends_on:
      - prometheus
    networks:
      - fraud-net
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/fraud_detection.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../services/monitoring/src/monitoring/dashboards:/etc/grafana/dashboards:ro
    restart: unless-stopped

  # ─── Evidently UI ─────────────────────────────────────────────────────────
  evidently-ui:
    image: evidently/evidently-service:latest
    container_name: evidently-ui
    networks:
      - fraud-net
    ports:
      - "8085:8085"
    volumes:
      - ../../services/monitoring/src/monitoring/reports:/reports
    restart: unless-stopped
